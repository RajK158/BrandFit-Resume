<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 250px; font-family: Arial, sans-serif; padding: 10px; margin: 0; }
    h3 { margin-top: 0; color: #333; }
    label { font-size: 12px; font-weight: bold; display: block; margin: 8px 0 3px; }
    input { width: 100%; padding: 6px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; margin-top: 15px; padding: 8px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>
  <h3>BrandResume Profile</h3>
  
  <label>Full Name</label>
  <input type="text" id="fullName" placeholder="John Doe">

  <label>Email</label>
  <input type="email" id="email" placeholder="john@example.com">

  <label>GitHub URL</label>
  <input type="text" id="github" placeholder="https://github.com/...">

  <label>LinkedIn URL</label>
  <input type="text" id="linkedin" placeholder="https://linkedin.com/in/...">

  <button id="saveBtn">Save Profile</button>
  <button id="fillBtn" style="background: #28a745; margin-top: 8px;">Autofill This Page</button>

  <script src="popup.js"></script>
</body>
</html>
