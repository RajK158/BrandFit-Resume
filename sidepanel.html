<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; padding: 15px; margin: 0; background: #fdfdfd; }
    h3 { margin-top: 0; color: #111; font-size: 16px; border-bottom: 2px solid #007bff; padding-bottom: 5px; }
    label { font-size: 11px; font-weight: bold; display: block; margin: 10px 0 3px; text-transform: uppercase; color: #555; }
    input { width: 100%; padding: 7px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
    .row { display: flex; gap: 8px; }
    .row div { flex: 1; }
    
    .panel-box { background: #f8f9fa; border: 1px solid #e2e8f0; padding: 10px; margin-top: 12px; border-radius: 6px; }
    .jd-box { max-height: 100px; overflow-y: auto; background: #fff; border: 1px solid #ddd; padding: 6px; font-size: 11px; color: #444; white-space: pre-wrap; margin-top: 5px; }
    
    button { width: 100%; margin-top: 10px; padding: 9px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; }
    button:hover { background: #0056b3; }
    .btn-success { background: #28a745; }
    .btn-success:hover { background: #218838; }
    .btn-secondary { background: #6c757d; }
    .btn-secondary:hover { background: #5a6268; }
  </style>
</head>
<body>
  <h3>BrandResume Workspace</h3>
  
  <div class="row">
    <div>
      <label>First Name</label>
      <input type="text" id="firstName" placeholder="Raj">
    </div>
    <div>
      <label>Last Name</label>
      <input type="text" id="lastName" placeholder="Kundur">
    </div>
  </div>

  <label>Email</label>
  <input type="email" id="email" placeholder="raj@example.com">

  <button id="saveBtn" class="btn-secondary">Save Core Profile</button>

  <!-- JobRight Intelligence Section -->
  <div class="panel-box">
    <strong style="font-size: 13px; color: #007bff;">Scraped Job Context</strong>
    <button id="scrapeBtn">Extract Job Description</button>
    <div id="jdStatus" class="jd-box">No job description captured yet...</div>
  </div>

  <div class="panel-box">
    <strong style="font-size: 13px; color: #28a745;">Application Pipeline</strong>
    <button id="fillBtn" class="btn-success">Trigger Auto-Apply</button>
    <button id="optimizeBtn" style="background: #6f42c1;">Tailor Resume Keywords</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
